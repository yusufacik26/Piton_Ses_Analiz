<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ses Kaydedici</title>
</head>
<body>

<h2>🎤 Ses Kaydedici</h2>

<h3>📂 Kayıtlar</h3>
<div id="recordingsList"></div>

<button onclick="startRecording()">▶️ Kayıt Başlat</button>
<button onclick="stopRecording()">⏹️ Kayıt Bitir</button>
<button onclick="uploadAudio()">📤 Gönder</button>

<br><br>

<h3>🎧 Önizleme (Ham)</h3>
<audio id="audioPlayback" controls></audio>

<script>
let audioContext;
let mediaStream;
let scriptProcessor;
let pcmChunks = [];
let sampleRate = 16000;
let audioBlob = null;

// Float32 → 16bit PCM
function floatTo16BitPCM(float32Array) {
    const buffer = new ArrayBuffer(float32Array.length * 2);
    const view = new DataView(buffer);
    for (let i = 0; i < float32Array.length; i++) {
        let s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return buffer;
}

// WAV header oluştur
function encodeWAV(samples, sampleRate) {
    const buffer = new ArrayBuffer(44 + samples.byteLength);
    const view = new DataView(buffer);

    function writeString(offset, string) {
        for (let i = 0; i < string.length; i++)
            view.setUint8(offset + i, string.charCodeAt(i));
    }

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + samples.byteLength, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);          // mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, 'data');
    view.setUint32(40, samples.byteLength, true);

    new Uint8Array(buffer).set(new Uint8Array(samples), 44);
    return new Blob([buffer], { type: 'audio/wav' });
}

// Kayıt başlat
async function startRecording() {
    try {
        pcmChunks = [];
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext({ sampleRate });

        const source = audioContext.createMediaStreamSource(mediaStream);
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

        scriptProcessor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            pcmChunks.push(floatTo16BitPCM(input));
        };

        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        alert("🔴 Kayıt başladı!");
    } catch (err) {
        alert("Mikrofon izni gerekli!");
    }
}

// Kayıt bitir
function stopRecording() {
    if (!scriptProcessor) return;

    scriptProcessor.disconnect();
    audioContext.close();
    mediaStream.getTracks().forEach(t => t.stop());

    // Tüm PCM chunk'ları birleştir
    const totalLength = pcmChunks.reduce((acc, b) => acc + b.byteLength, 0);
    const combined = new Uint8Array(totalLength);
    let offset = 0;
    for (const chunk of pcmChunks) {
        combined.set(new Uint8Array(chunk), offset);
        offset += chunk.byteLength;
    }

    // WAV blob oluştur
    audioBlob = encodeWAV(combined.buffer, sampleRate);
    const audioUrl = URL.createObjectURL(audioBlob);
    document.getElementById("audioPlayback").src = audioUrl;

    alert("⏹️ Kayıt bitti!");
}

// Gönder
async function uploadAudio() {
    if (!audioBlob) {
        alert("Önce kayıt yap!");
        return;
    }

    const formData = new FormData();
    const uniqueFilename = "kayit_" + Date.now() + ".wav"; // Direkt WAV!
    formData.append("file", audioBlob, uniqueFilename);

    try {
        const response = await fetch("/upload/", {
            method: "POST",
            body: formData
        });

        await response.json();
        alert("✅ Yüklendi ve işlendi!");

        document.getElementById("audioPlayback").removeAttribute("src");
        audioBlob = null;

        await loadRecordings();
    } catch (error) {
        alert("❌ Hata oluştu");
    }
}

// Sil
async function deleteAudio(filename) {
    if (!confirm(`${filename} silinsin mi?`)) return;
    await fetch(`/delete/${filename}`, { method: "DELETE" });
    await loadRecordings();
}

// Listele
async function loadRecordings() {
    const response = await fetch("/recordings");
    const data = await response.json();

    const listDiv = document.getElementById("recordingsList");
    listDiv.innerHTML = "";

    if (data.length === 0) {
        listDiv.innerHTML = "<p>Henüz kayıt yok</p>";
        return;
    }

    data.forEach(rec => {
        const div = document.createElement("div");
        div.innerHTML = `
            <p><b>${rec.filename}</b></p>
            <p>🔊 Ham Kayıt</p>
            <audio controls src="${rec.raw_url}"></audio>
            <p>✨ Filtrelenmiş Kayıt</p>
            <audio controls src="${rec.clean_url}"></audio>
            <br>
            <button onclick="deleteAudio('${rec.filename}')" style="color:red;">🗑️ Sil</button>
            <hr>
        `;
        listDiv.appendChild(div);
    });
}

window.onload = loadRecordings;
</script>

</body>
</html>
