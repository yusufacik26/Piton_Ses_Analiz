<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ses Kaydedici</title>
</head>
<body>

<h2>🎤 Ses Kaydedici</h2>

<h3>📂 Kayıtlar</h3>
<div id="recordingsList"></div>

<button onclick="startRecording()">▶️ Kayıt Başlat</button>
<button onclick="stopRecording()">⏹️ Kayıt Bitir</button>
<button onclick="uploadAudio()">📤 Gönder</button>

<br><br>

<audio id="audioPlayback" controls></audio>

<script>
let mediaRecorder;
let audioChunks = [];
let audioBlob = null;




// 🎤 Kayıt başlat
async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

            const audioUrl = URL.createObjectURL(audioBlob);
            document.getElementById("audioPlayback").src = audioUrl;

            console.log("Kayıt hazır");
        };

        mediaRecorder.start();
    } catch (err) {
        console.error("Mikrofon erişim hatası:", err);
        alert("Mikrofon erişimine izin vermeniz gerekiyor!");
    }
}

// ⏹️ Kayıt bitir
function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
}

// 📤 API'ye gönder
async function uploadAudio() {
    if (!audioBlob) {
        alert("Önce kayıt yap!");
        return;
    }

    const formData = new FormData();
    
    // Her kaydın benzersiz olması için zaman damgası ekliyoruz
    const uniqueFilename = "kayit_" + Date.now() + ".webm"; 
    formData.append("file", audioBlob, uniqueFilename);

    try {
        // FastAPI tarafındaki endpoint ile birebir eşleşmesi için sonuna / ekledik
        const response = await fetch("/upload/", {
            method: "POST",
            body: formData
        });

        const result = await response.json();
        console.log(result);

        alert("✅ Yüklendi!");

        // Yükleme sonrası önizleme oynatıcısını sıfırla (opsiyonel ama iyi bir deneyim sunar)
        document.getElementById("audioPlayback").removeAttribute("src");
        audioBlob = null; 

        // 🔥 YENİ: kayıtları yeniden yükle
        await loadRecordings();

    } catch (error) {
        console.error(error);
        alert("❌ Hata oluştu");
    }
}

// 🗑️ KAYIT SİL
async function deleteAudio(filename) {
    // Kullanıcıdan onay isteyelim ki yanlışlıkla silinmesin
    const userConfirmed = confirm(`"${filename}" dosyasını silmek istediğinize emin misiniz?`);
    
    if (!userConfirmed) {
        return; // Kullanıcı iptal ederse işlemi durdur
    }

    try {
        const response = await fetch(`/delete/${filename}`, {
            method: "DELETE" // HTTP DELETE metodunu kullanıyoruz
        });

        if (response.ok) {
            const result = await response.json();
            alert("✅ " + result.message);
            
            // Silme işleminden sonra listeyi yenile
            await loadRecordings();
        } else {
            alert("❌ Dosya silinirken bir hata oluştu.");
        }

    } catch (error) {
        console.error("Silme hatası:", error);
        alert("❌ Sunucuya bağlanırken hata oluştu.");
    }
}


// 📂 KAYITLARI ÇEK
async function loadRecordings() {
    try {
        const response = await fetch("/recordings");
        const data = await response.json();

        const listDiv = document.getElementById("recordingsList");
        listDiv.innerHTML = "";

        if (data.length === 0) {
            listDiv.innerHTML = "<p>Henüz kayıt yok</p>";
            return;
        }

        // BURADAKİ KARIŞIKLIK DÜZELTİLDİ: Sadece tek bir döngü olmalı
        data.forEach(rec => {
            const div = document.createElement("div");

            div.innerHTML = `
                <p><b>${rec.filename}</b></p>
                <audio controls src="${rec.url}"></audio>
                <button onclick="deleteAudio('${rec.filename}')" style="margin-left: 10px; color: red;">🗑️ Sil</button>
                <hr>
            `;

            listDiv.appendChild(div);
        });

    } catch (error) {
        console.error("Kayıtlar yüklenirken hata oluştu:", error);
    }
}

// 🔥 SAYFA AÇILINCA ÇALIŞ
window.onload = loadRecordings;
</script>

</body>
</html>
