name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  python-build:
    name: Python - Sinyal Isleme Testi
    runs-on: ubuntu-latest
    steps:
      - name: Kodu cek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: noice.py import testi
        run: python -c "import noice; print('noice.py basariyla yuklendi')"

  backend-build:
    name: Backend - FastAPI Build
    runs-on: ubuntu-latest
    needs: python-build
    steps:
      - name: Kodu cek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: FastAPI import testi
        run: python -c "from main import app; print('FastAPI app basariyla yuklendi')"

  docker-build:
    name: Docker - Image Build
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - name: Kodu cek
        uses: actions/checkout@v3

      - name: Docker image build et
        run: docker build -t ses-kalitesi-app .