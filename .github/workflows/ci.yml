name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  python-build:
    name: Python - Sinyal Isleme Testi
    runs-on: ubuntu-latest
    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: noice.py import testi
        run: python -c "import noice; print('noice.py basariyla yuklendi')"

  backend-build:
    name: Backend - FastAPI Build
    runs-on: ubuntu-latest
    needs: python-build
    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: FastAPI syntax kontrolu
        run: python -m py_compile main.py && echo "main.py syntax OK"

  docker-build:
    name: Docker - Image Build
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Docker image build et
        run: docker build -t ses-kalitesi-app .
